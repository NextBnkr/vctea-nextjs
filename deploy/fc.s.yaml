edition: 3.0.0
name: vctea-nextjs-fc
access: default

resources:
  webapp:
    component: fc3
    props:
      region: ${env(FC_REGION)}
      functionName: ${env(FC_FUNCTION_NAME)}
      runtime: custom-container
      timeout: ${env(FC_TIMEOUT)}
      memorySize: ${env(FC_MEMORY_SIZE)}
      cpu: ${env(FC_CPU)}
      diskSize: ${env(FC_DISK_SIZE)}
      instanceConcurrency: ${env(FC_INSTANCE_CONCURRENCY)}
      internetAccess: true
      customContainerConfig:
        image: ${env(FC_IMAGE)}
        port: 3000
      environmentVariables:
        NEXT_PUBLIC_APP_ID: ${env(NEXT_PUBLIC_APP_ID)}
        NEXT_PUBLIC_APP_KEY: ${env(NEXT_PUBLIC_APP_KEY)}
        NEXT_PUBLIC_API_URL: ${env(NEXT_PUBLIC_API_URL)}
        NEXT_PUBLIC_APP_TYPE_WORKFLOW: ${env(NEXT_PUBLIC_APP_TYPE_WORKFLOW)}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - HEAD
              - OPTIONS
