name: deploy-fc

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-fc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FC_REGION: ${{ vars.FC_REGION }}
      FC_FUNCTION_NAME: ${{ vars.FC_FUNCTION_NAME }}
      FC_TIMEOUT: ${{ vars.FC_TIMEOUT }}
      FC_MEMORY_SIZE: ${{ vars.FC_MEMORY_SIZE }}
      FC_CPU: ${{ vars.FC_CPU }}
      FC_DISK_SIZE: ${{ vars.FC_DISK_SIZE }}
      FC_INSTANCE_CONCURRENCY: ${{ vars.FC_INSTANCE_CONCURRENCY }}
      NEXT_PUBLIC_APP_ID: ${{ vars.NEXT_PUBLIC_APP_ID }}
      NEXT_PUBLIC_APP_KEY: ${{ secrets.NEXT_PUBLIC_APP_KEY }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_APP_TYPE_WORKFLOW: ${{ vars.NEXT_PUBLIC_APP_TYPE_WORKFLOW }}
      ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
      ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
      ACR_REPOSITORY: ${{ vars.ACR_REPOSITORY }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set-image
        run: echo "FC_IMAGE=${ACR_REGISTRY}/${ACR_NAMESPACE}/${ACR_REPOSITORY}:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: login acr
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.FC_IMAGE }}
          build-args: |
            NEXT_PUBLIC_APP_ID=${{ env.NEXT_PUBLIC_APP_ID }}
            NEXT_PUBLIC_APP_KEY=${{ env.NEXT_PUBLIC_APP_KEY }}
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_TYPE_WORKFLOW=${{ env.NEXT_PUBLIC_APP_TYPE_WORKFLOW }}

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install serverless devs
        run: npm install -g @serverless-devs/s@3

      - name: configure aliyun account
        run: s config add --AccountID ${{ secrets.ALIYUN_ACCOUNT_ID }} --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -a default --force

      - name: deploy function
        run: s deploy -t deploy/fc.s.yaml --use-local
